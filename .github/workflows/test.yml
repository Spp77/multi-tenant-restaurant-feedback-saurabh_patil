name: Restaurant API CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# All jobs work inside saurabh_patil/ — the shared repo has one submission
# folder per candidate; ours is saurabh_patil/.
defaults:
  run:
    working-directory: saurabh_patil

jobs:
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff — fail fast on style violations
        # Fast feedback: fix linting before wasting CI minutes on tests
        run: ruff check src/ tests/

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint          # Only run tests if linting passes

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'   # Speeds up subsequent runs dramatically

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        # PYTHONPATH=. ensures src.* imports resolve from saurabh_patil/
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage report to Codecov
        # Add CODECOV_TOKEN in: repo Settings → Secrets → Actions
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./saurabh_patil/coverage.xml
          fail_ci_if_error: false   # Don't break the build if Codecov is unreachable
